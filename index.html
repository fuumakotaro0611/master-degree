<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修士課程・個人目標管理ダッシュボード</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 650px;
            position: relative;
        }
        .section {
            margin-bottom: 35px;
            position: relative;
        }
        .section:last-child {
            margin-bottom: 0;
        }
        h2 {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-left: 4px solid #3498db;
            padding-left: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vision-display {
            font-size: 1.25rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.6;
            background: #fafbfc;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
        }
        /* カウントダウン */
        .countdown {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .time-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
        }
        .number {
            font-size: 2rem;
            font-weight: bold;
            color: #1e293b;
            display: block;
        }
        .label {
            font-size: 0.75rem;
            color: #64748b;
        }
        /* 進捗バー */
        .progress-container {
            background: #e2e8f0;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin-top: 15px;
        }
        .progress-bar {
            background: linear-gradient(90deg, #3498db, #2ecc71);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }
        /* マイルストーンリスト */
        .milestone-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .milestone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .milestone-item:last-child {
            border-bottom: none;
        }
        .milestone-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .milestone-title {
            font-weight: bold;
            font-size: 1rem;
        }
        .milestone-desc {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 2px;
        }
        .milestone-date-display {
            font-size: 0.85rem;
            color: #3498db;
            font-weight: bold;
            white-space: nowrap;
            margin-left: 15px;
            text-align: right;
            background: #e0f2fe;
            padding: 4px 8px;
            border-radius: 4px;
        }
        /* ボタンとフォーム関係 */
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2980b9;
        }
        .btn-edit-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #475569;
        }
        .btn-edit-toggle:hover {
            background: #334155;
        }
        .edit-mode-panel {
            display: none;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #475569;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            color: inherit;
        }
        .milestone-inputs {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            position: relative;
            border: 1px solid #e2e8f0;
        }
        .btn-delete {
            background: #e74c3c;
            padding: 4px 8px;
            margin-top: 8px;
        }
        .btn-delete:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

<div class="card">
    <button class="btn btn-edit-toggle" id="editToggleBtn" onclick="toggleEditMode()">⚙️ 設定・編集モード</button>

    <!-- 1. 目的・長期目標 -->
    <div class="section">
        <h2>修士課程の目的・大目標</h2>
        <div class="vision-display" id="visionDisplay">目標が設定されていません。</div>
    </div>

    <!-- 2. カウントダウンと全体の進捗率 -->
    <div class="section">
        <h2>修士卒業まで（全体の進捗）</h2>
        <div class="countdown">
            <div class="time-box"><span class="number" id="days">00</span><span class="label">日</span></div>
            <div class="time-box"><span class="number" id="hours">00</span><span class="label">時間</span></div>
            <div class="time-box"><span class="number" id="minutes">00</span><span class="label">分</span></div>
            <div class="time-box"><span class="number" id="seconds">00</span><span class="label">秒</span></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text">
            <span id="startText">開始 (--/--/--)</span>
            <span id="progressPercentage">0%</span>
            <span id="targetText">卒業 (--/--/--)</span>
        </div>
    </div>

    <!-- 3. 期間ごとのマイルストーン目標 -->
    <div class="section">
        <h2>期間ごとの目標</h2>
        <ul class="milestone-list" id="milestoneListDisplay">
            <!-- JSで動的に追加 -->
        </ul>
    </div>

    <!-- 4. 編集用隠しパネル -->
    <div class="edit-mode-panel" id="editPanel">
        <h3 style="margin-top:0; color:#1e293b; font-size:1.1rem; border-bottom:2px solid #cbd5e1; padding-bottom:8px;">ダッシュボード設定</h3>
        
        <div class="form-group">
            <label>修士課程の目的・大目標</label>
            <textarea id="inputVision" rows="2"></textarea>
        </div>

        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>修了課程 開始日</label>
                <input type="date" id="inputStartDate">
            </div>
            <div style="flex: 1;">
                <label>卒業・学位授与 予定日</label>
                <input type="date" id="inputTargetDate">
            </div>
        </div>

        <div class="form-group">
            <label style="display:flex; justify-content:space-between; align-items:center;">
                <span>期間ごとの目標設定（開始日〜終了日）</span>
                <button class="btn" style="background:#2ecc71;" onclick="addMilestoneInputField()">＋ 目標を追加</button>
            </label>
            <div id="milestoneInputsContainer">
                <!-- 動的に入力欄を追加 -->
            </div>
        </div>

        <div style="margin-top: 20px; text-align: right; display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn" style="background:#94a3b8;" onclick="toggleEditMode()">キャンセル</button>
            <button class="btn" style="background:#2ecc71; font-weight:bold; padding:6px 20px;" onclick="saveSettings()">設定を保存</button>
        </div>
    </div>
</div>

<script>
    // デフォルトデータ（期間表示に対応）
    const defaultData = {
        vision: "「〇〇のメカニズムを解明し、国際学会で成果を発表して納得のいく形で学位を取得する！」",
        startDate: "2026-04-01",
        targetDate: "2030-03-25",
        milestones: [
            { title: "基礎研究・文献調査フェーズ", desc: "関連論文を読み込み研究背景を固める", dateStart: "2026-04-01", dateEnd: "2026-07-31" },
            { title: "中間発表・予備審査の突破", desc: "主査・副査を納得させる成果報告", dateStart: "2027-06-01", dateEnd: "2027-07-15" },
            { title: "修士論文の執筆完了・提出", desc: "余裕を持って形を完成させる", dateStart: "2029-11-01", dateEnd: "2030-01-15" }
        ]
    };

    let appData = {};

    function loadData() {
        const localData = localStorage.getItem('masterDashboardData_v2');
        if (localData) {
            appData = JSON.parse(localData);
        } else {
            // 旧バージョンデータがある場合の互換性処理
            const oldLocalData = localStorage.getItem('masterDashboardData');
            if (oldLocalData) {
                const oldData = JSON.parse(oldLocalData);
                appData = {
                    vision: oldData.vision,
                    startDate: oldData.startDate,
                    targetDate: oldData.targetDate,
                    milestones: oldData.milestones.map(m => ({
                        title: m.title, desc: m.desc, dateStart: m.date, dateEnd: m.date
                    }))
                };
            } else {
                appData = JSON.parse(JSON.stringify(defaultData));
            }
        }
        renderDisplay();
    }

    function renderDisplay() {
        document.getElementById('visionDisplay').innerText = appData.vision;
        document.getElementById('startText').innerText = `開始 (${appData.startDate.replace(/-/g, '/')})`;
        document.getElementById('targetText').innerText = `卒業 (${appData.targetDate.replace(/-/g, '/')})`;

        // 開始日順にソートして表示
        const sortedMilestones = [...appData.milestones].sort((a, b) => new Date(a.dateStart) - new Date(b.dateStart));
        const listContainer = document.getElementById('milestoneListDisplay');
        listContainer.innerHTML = '';

        if(sortedMilestones.length === 0) {
            listContainer.innerHTML = '<li class="milestone-item" style="color:#94a3b8;">期間目標が登録されていません。</li>';
        }

        sortedMilestones.forEach(m => {
            const li = document.createElement('li');
            li.className = 'milestone-item';
            
            const dStart = new Date(m.dateStart);
            const dEnd = new Date(m.dateEnd);
            
            let periodStr = "";
            if (m.dateStart === m.dateEnd) {
                periodStr = `${dStart.getFullYear()}/${dStart.getMonth()+1}/${dStart.getDate()}`;
            } else {
                periodStr = `${dStart.getFullYear()}/${dStart.getMonth()+1}/${dStart.getDate()} ～ ${dEnd.getFullYear()}/${dEnd.getMonth()+1}/${dEnd.getDate()}`;
            }

            li.innerHTML = `
                <div class="milestone-info">
                    <span class="milestone-title">${m.title}</span>
                    <span class="milestone-desc">${m.desc || ''}</span>
                </div>
                <span class="milestone-date-display">${periodStr}</span>
            `;
            listContainer.appendChild(li);
        });
    }

    function updateCounters() {
        if (!appData.startDate || !appData.targetDate) return;

        const now = new Date();
        const start = new Date(appData.startDate + "T00:00:00");
        const target = new Date(appData.targetDate + "T10:00:00"); 

        const totalDuration = target - start;
        const elapsedDuration = now - start;
        const remainingDuration = target - now;

        if (remainingDuration <= 0) {
            document.getElementById('days').innerText = '00';
            document.getElementById('hours').innerText = '00';
            document.getElementById('minutes').innerText = '00';
            document.getElementById('seconds').innerText = '00';
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressPercentage').innerText = '100%';
            return;
        }

        const days = Math.floor(remainingDuration / (1000 * 60 * 60 * 24));
        const hours = Math.floor((remainingDuration % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((remainingDuration % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((remainingDuration % (1000 * 60)) / 1000);

        document.getElementById('days').innerText = String(days).padStart(2, '0');
        document.getElementById('hours').innerText = String(hours).padStart(2, '0');
        document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
        document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');

        let progressPercent = (elapsedDuration / totalDuration) * 100;
        progressPercent = Math.max(0, Math.min(100, progressPercent));
        
        document.getElementById('progressBar').style.width = progressPercent.toFixed(2) + '%';
        document.getElementById('progressPercentage').innerText = progressPercent.toFixed(1) + '%';
    }

    let isEditMode = false;
    function toggleEditMode() {
        isEditMode = !isEditMode;
        const panel = document.getElementById('editPanel');
        const toggleBtn = document.getElementById('editToggleBtn');
        
        if (isEditMode) {
            panel.style.display = 'block';
            toggleBtn.innerText = '📁 表示モードに戻る';
            
            document.getElementById('inputVision').value = appData.vision;
            document.getElementById('inputStartDate').value = appData.startDate;
            document.getElementById('inputTargetDate').value = appData.targetDate;
            
            const container = document.getElementById('milestoneInputsContainer');
            container.innerHTML = '';
            appData.milestones.forEach(m => {
                addMilestoneInputField(m.title, m.desc, m.dateStart, m.dateEnd);
            });
            
            panel.scrollIntoView({ behavior: 'smooth' });
        } else {
            panel.style.display = 'none';
            toggleBtn.innerText = '⚙️ 設定・編集モード';
        }
    }

    function addMilestoneInputField(title = '', desc = '', dateStart = '', dateEnd = '') {
        const container = document.getElementById('milestoneInputsContainer');
        const div = document.createElement('div');
        div.className = 'milestone-inputs';
        div.innerHTML = `
            <div style="margin-bottom: 8px;">
                <input type="text" placeholder="目標・イベント名（例: 中間発表フェーズ）" class="m-title" value="${title}">
            </div>
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:8px;">
                <input type="date" class="m-date-start" value="${dateStart}" style="flex:1;">
                <span style="font-size:0.8rem; color:#64748b;">～</span>
                <input type="date" class="m-date-end" value="${dateEnd}" style="flex:1;">
            </div>
            <div>
                <input type="text" placeholder="詳細・具体的な目的など（任意）" class="m-desc" value="${desc}">
            </div>
            <button class="btn btn-delete" onclick="this.parentElement.remove()">削除</button>
        `;
        container.appendChild(div);
    }

    function saveSettings() {
        const vision = document.getElementById('inputVision').value;
        const startDate = document.getElementById('inputStartDate').value;
        const targetDate = document.getElementById('inputTargetDate').value;

        if(!startDate || !targetDate) {
            alert('開始日と卒業予定日は必須入力です。');
            return;
        }

        const milestones = [];
        const titleElements = document.querySelectorAll('.m-title');
        const startElements = document.querySelectorAll('.m-date-start');
        const endElements = document.querySelectorAll('.m-date-end');
        const descElements = document.querySelectorAll('.m-desc');

        for (let i = 0; i < titleElements.length; i++) {
            if (titleElements[i].value.trim() !== '' && startElements[i].value !== '') {
                // 終了日が空の場合は開始日と同じにする
                const endVal = endElements[i].value !== '' ? endElements[i].value : startElements[i].value;
                milestones.push({
                    title: titleElements[i].value.trim(),
                    desc: descElements[i].value.trim(),
                    dateStart: startElements[i].value,
                    dateEnd: endVal
                });
            }
        }

        appData = { vision, startDate, targetDate, milestones };
        localStorage.setItem('masterDashboardData_v2', JSON.stringify(appData));
        
        renderDisplay();
        updateCounters();
        toggleEditMode();
    }

    loadData();
    setInterval(updateCounters, 1000);
    updateCounters();
</script>

</body>
</html>
